<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zara's Boss Girl Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .history-scroll::-webkit-scrollbar { width: 6px; }
        .history-scroll::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        .history-scroll::-webkit-scrollbar-thumb { background: rgba(236, 72, 153, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">

    <div id="authScreen" class="max-w-md mx-auto mt-20 glass p-8 shadow-2xl">
        <h1 class="text-3xl font-bold text-center text-purple-600 mb-6" id="authTitle">Login to Quest</h1>
        
        <form id="authForm" class="space-y-4">
            <div id="nameField" class="hidden">
                <label class="block text-sm font-semibold text-gray-600 mb-1">Display Name</label>
                <input type="text" id="authName" class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-pink-500">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Email</label>
                <input type="email" id="authEmail" required class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-pink-500">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
                <input type="password" id="authPassword" required class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-pink-500">
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-pink-500 to-purple-500 text-white font-bold py-2 rounded-lg shadow-md hover:opacity-90 transition" id="authSubmitBtn">
                Login
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4 cursor-pointer hover:text-purple-600" id="toggleAuthMode">
            Need an account? Register here.
        </p>
    </div>

    <div id="appScreen" class="max-w-7xl mx-auto hidden flex-col lg:flex-row gap-8">
        
        <div class="flex-1 space-y-8">
            
            <div class="glass p-8 text-center shadow-xl relative">
                <button onclick="openProfile()" class="absolute top-4 right-4 bg-white/50 hover:bg-white px-4 py-2 rounded-lg shadow text-sm font-bold text-purple-700 transition">
                    👤 Profile
                </button>
                <button onclick="logout()" class="absolute top-4 left-4 bg-white/50 hover:bg-white px-4 py-2 rounded-lg shadow text-sm font-bold text-pink-600 transition">
                    🚪 Logout
                </button>

                <h1 class="text-4xl font-bold text-purple-600 mb-2">✨ Zara's Boss Girl Quest ✨</h1>
                <p class="text-lg text-gray-600 mb-6">Welcome, <span id="welcomeName" class="font-bold text-pink-500"></span>!</p>
                
                <div class="flex flex-wrap justify-center gap-4 md:gap-8">
                    <div class="bg-white p-4 rounded-xl shadow-md border border-pink-200 w-36 md:w-40">
                        <p class="text-sm text-gray-500 font-semibold">Total Gems 💎</p>
                        <p id="gemCount" class="text-3xl font-bold text-pink-500">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-md border border-emerald-200 w-36 md:w-40">
                        <p class="text-sm text-gray-500 font-semibold">Earnings 💷</p>
                        <p id="poundBalance" class="text-3xl font-bold text-emerald-500">£0.00</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-md border border-purple-200 w-40 md:w-48">
                        <p class="text-sm text-gray-500 font-semibold">Current Level 👑</p>
                        <p id="levelDisplay" class="text-xl font-bold text-purple-600 mt-1">The Rookie</p>
                    </div>
                </div>
            </div>

            <div class="glass p-6 shadow-lg">
                <h2 class="text-2xl font-bold text-purple-700 mb-4">📝 Add a New Task</h2>
                <form id="taskForm" class="flex flex-col md:flex-row gap-4">
                    <input type="text" id="taskInput" placeholder="What needs to be done?" required
                        class="flex-1 px-4 py-3 rounded-lg border border-pink-300 focus:outline-none focus:ring-2 focus:ring-pink-500">
                    
                    <select id="difficultySelect" class="px-4 py-3 rounded-lg border border-pink-300 focus:outline-none focus:ring-2 focus:ring-pink-500 bg-white">
                        <option value="simple">Simple (10 Gems / £0.10)</option>
                        <option value="medium">Medium (20 Gems / £0.20)</option>
                        <option value="hard">Hard (50 Gems / £0.50)</option>
                    </select>
                    
                    <button type="submit" class="bg-gradient-to-r from-pink-500 to-purple-500 text-white px-6 py-3 rounded-lg font-bold hover:opacity-90 transition shadow-md">
                        Add Task ➕
                    </button>
                </form>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-6 shadow-lg flex flex-col h-full">
                    <div class="bg-pink-100 p-2 rounded-lg text-center mb-4 border border-pink-200">
                        <h3 class="text-xl font-bold text-pink-600">🎀 Simple Tasks</h3>
                    </div>
                    <div id="simpleList" class="space-y-3 flex-1"></div>
                </div>

                <div class="glass p-6 shadow-lg flex flex-col h-full">
                    <div class="bg-purple-100 p-2 rounded-lg text-center mb-4 border border-purple-200">
                        <h3 class="text-xl font-bold text-purple-600">💫 Medium Tasks</h3>
                    </div>
                    <div id="mediumList" class="space-y-3 flex-1"></div>
                </div>

                <div class="glass p-6 shadow-lg flex flex-col h-full">
                    <div class="bg-indigo-100 p-2 rounded-lg text-center mb-4 border border-indigo-200">
                        <h3 class="text-xl font-bold text-indigo-600">🚀 Hard Tasks</h3>
                    </div>
                    <div id="hardList" class="space-y-3 flex-1"></div>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-80 lg:shrink-0 h-fit">
            <div class="glass p-6 shadow-lg flex flex-col max-h-[800px]">
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-2xl">📜</span>
                    <h2 class="text-2xl font-bold text-purple-700">Quest History</h2>
                </div>
                <div id="historyList" class="space-y-4 overflow-y-auto history-scroll pr-2 pb-2 flex-1"></div>
            </div>
        </div>
    </div>

    <div id="profileModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="glass p-8 max-w-md w-full shadow-2xl relative">
            <button onclick="closeProfile()" class="absolute top-4 right-4 text-gray-500 hover:text-red-500 font-bold">✕</button>
            <h2 class="text-2xl font-bold text-purple-700 mb-6">Edit Profile</h2>
            
            <form id="profileForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Display Name</label>
                    <input type="text" id="editName" required class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-pink-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Email</label>
                    <input type="email" id="editEmail" required class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-pink-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">New Password</label>
                    <input type="password" id="editPassword" placeholder="Leave blank to keep current" class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-pink-500">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-emerald-400 to-emerald-600 text-white font-bold py-2 rounded-lg shadow-md hover:opacity-90 transition">
                    Save Changes
                </button>
            </form>
        </div>
    </div>

    <script>
        // Data State
        let users = JSON.parse(localStorage.getItem('zaraUsers')) || [];
        let currentUser = JSON.parse(localStorage.getItem('zaraCurrentUser')) || null;
        let gems = parseInt(localStorage.getItem('zaraGems')) || 0;
        let tasks = JSON.parse(localStorage.getItem('zaraTasks')) || [];
        let isRegistering = false;

        // Auth Logic
        const authScreen = document.getElementById('authScreen');
        const appScreen = document.getElementById('appScreen');
        const authForm = document.getElementById('authForm');
        
        function checkAuth() {
            if (currentUser) {
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                appScreen.classList.add('flex');
                document.getElementById('welcomeName').innerText = currentUser.name;
                updateUI();
            } else {
                authScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
                appScreen.classList.remove('flex');
            }
        }

        document.getElementById('toggleAuthMode').addEventListener('click', () => {
            isRegistering = !isRegistering;
            document.getElementById('authTitle').innerText = isRegistering ? "Register Account" : "Login to Quest";
            document.getElementById('authSubmitBtn').innerText = isRegistering ? "Register" : "Login";
            document.getElementById('toggleAuthMode').innerText = isRegistering ? "Already have an account? Login here." : "Need an account? Register here.";
            
            if (isRegistering) {
                document.getElementById('nameField').classList.remove('hidden');
                document.getElementById('authName').required = true;
            } else {
                document.getElementById('nameField').classList.add('hidden');
                document.getElementById('authName').required = false;
            }
        });

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;

            if (isRegistering) {
                const name = document.getElementById('authName').value;
                const userExists = users.find(u => u.email === email);
                if (userExists) return alert("Email already registered!");
                
                const newUser = { name, email, password };
                users.push(newUser);
                localStorage.setItem('zaraUsers', JSON.stringify(users));
                currentUser = newUser;
            } else {
                const user = users.find(u => u.email === email && u.password === password);
                if (!user) return alert("Invalid credentials!");
                currentUser = user;
            }

            localStorage.setItem('zaraCurrentUser', JSON.stringify(currentUser));
            authForm.reset();
            checkAuth();
        });

        function logout() {
            currentUser = null;
            localStorage.removeItem('zaraCurrentUser');
            checkAuth();
        }

        // Profile Logic
        const profileModal = document.getElementById('profileModal');
        const profileForm = document.getElementById('profileForm');

        function openProfile() {
            document.getElementById('editName').value = currentUser.name;
            document.getElementById('editEmail').value = currentUser.email;
            profileModal.classList.remove('hidden');
        }

        function closeProfile() {
            profileModal.classList.add('hidden');
            document.getElementById('editPassword').value = '';
        }

        profileForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const newName = document.getElementById('editName').value;
            const newEmail = document.getElementById('editEmail').value;
            const newPassword = document.getElementById('editPassword').value;

            const userIndex = users.findIndex(u => u.email === currentUser.email);
            
            users[userIndex].name = newName;
            users[userIndex].email = newEmail;
            if (newPassword) users[userIndex].password = newPassword;

            currentUser = users[userIndex];
            localStorage.setItem('zaraUsers', JSON.stringify(users));
            localStorage.setItem('zaraCurrentUser', JSON.stringify(currentUser));
            
            document.getElementById('welcomeName').innerText = currentUser.name;
            closeProfile();
            alert("Profile updated!");
        });

        // App Logic
        function formatDate(dateString) {
            if (!dateString) return "Unknown date";
            return new Date(dateString).toLocaleDateString('en-GB', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function updateUI() {
            document.getElementById('gemCount').innerText = gems;
            localStorage.setItem('zaraGems', gems);
            document.getElementById('poundBalance').innerText = '£' + (gems * 0.01).toFixed(2);
            localStorage.setItem('zaraTasks', JSON.stringify(tasks));

            let level = 1, levelName = "The Rookie";
            if (gems >= 51) { level = 2; levelName = "Rising Star"; }
            if (gems >= 151) { level = 3; levelName = "Boss Executive"; }
            document.getElementById('levelDisplay').innerText = levelName;

            const simpleList = document.getElementById('simpleList');
            const mediumList = document.getElementById('mediumList');
            const hardList = document.getElementById('hardList');
            const historyList = document.getElementById('historyList');

            simpleList.innerHTML = ''; mediumList.innerHTML = ''; hardList.innerHTML = ''; historyList.innerHTML = '';

            const activeTasks = []; const completedTasks = [];
            tasks.forEach((task, index) => {
                if (task.completed) completedTasks.push({ ...task, originalIndex: index });
                else activeTasks.push({ ...task, originalIndex: index });
            });

            activeTasks.forEach(task => {
                const taskDiv = document.createElement('div');
                taskDiv.className = "bg-white p-4 rounded-lg shadow-sm border border-gray-100 flex flex-col gap-2";
                
                let isLocked = (task.difficulty === 'medium' && level < 2) || (task.difficulty === 'hard' && level < 3);
                
                let btnHTML = isLocked 
                    ? `<button disabled class="px-3 py-1 rounded-md text-xs font-bold text-white bg-gray-400 cursor-not-allowed">🔒 Locked</button>`
                    : `<button onclick="completeTask(${task.originalIndex}, '${task.difficulty}')" class="px-3 py-1 rounded-md text-xs font-bold text-white bg-indigo-400 hover:bg-indigo-500 shadow-sm">Done ✓</button>`;

                taskDiv.innerHTML = `
                    <div class="flex justify-between items-start gap-2">
                        <span class="text-sm font-medium text-gray-700 leading-snug">${task.text}</span>
                        ${btnHTML}
                    </div>
                    <div class="text-[10px] text-gray-400 mt-1 flex justify-between">
                        <span>👤 Assigned by: <span class="font-semibold text-purple-500">${task.assignedBy || 'Admin'}</span></span>
                        <span>${formatDate(task.dateAdded)}</span>
                    </div>
                `;

                if (task.difficulty === 'simple') simpleList.appendChild(taskDiv);
                if (task.difficulty === 'medium') mediumList.appendChild(taskDiv);
                if (task.difficulty === 'hard') hardList.appendChild(taskDiv);
            });

            completedTasks.sort((a, b) => new Date(b.dateCompleted) - new Date(a.dateCompleted)).forEach(task => {
                const historyCard = document.createElement('div');
                historyCard.className = `bg-white p-4 rounded-lg shadow-sm border-l-4 ${task.difficulty === 'simple' ? 'border-pink-400' : task.difficulty === 'medium' ? 'border-purple-400' : 'border-indigo-400'}`;
                
                historyCard.innerHTML = `
                    <p class="text-sm font-medium text-gray-800 mb-2">${task.text}</p>
                    <div class="text-[11px] text-gray-500 flex flex-col gap-1">
                        <p>👤 Assigned by: ${task.assignedBy || 'Admin'}</p>
                        <p>✅ Done: <span class="font-semibold text-emerald-600">${formatDate(task.dateCompleted)}</span></p>
                    </div>
                `;
                historyList.appendChild(historyCard);
            });
        }

        function completeTask(index, difficulty) {
            gems += (difficulty === 'simple' ? 10 : difficulty === 'medium' ? 20 : 50);
            tasks[index].completed = true;
            tasks[index].dateCompleted = new Date().toISOString();
            updateUI();
        }

        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            tasks.push({
                text: document.getElementById('taskInput').value,
                difficulty: document.getElementById('difficultySelect').value,
                completed: false,
                dateAdded: new Date().toISOString(),
                assignedBy: currentUser.name 
            });
            document.getElementById('taskInput').value = '';
            updateUI();
        });

        // Init
        checkAuth();
    </script>
</body>
</html>
